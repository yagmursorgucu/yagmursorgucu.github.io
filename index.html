<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yağmur Sorgucu</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #ffffff; 
            padding: 50px;
            margin: 0;
        }

        .masonry-three-columns {
            margin: 0 auto;
            max-width: 1800px;
        }

        .grid-item {
            width: calc(25% - 40px); 
            margin-bottom: 50px;
            float: left;
        }

        .grid-item img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 0;
        }

        @media (max-width: 1200px) {
            .grid-item { width: calc(33.33% - 27px); }
        }
        @media (max-width: 800px) {
            .grid-item { width: calc(50% - 20px); }
        }
        @media (max-width: 500px) {
            .grid-item { width: 100%; margin-bottom: 50px; }
        }
    </style>
</head>
<body>

    <div class="masonry-three-columns" id="grid">
        </div>

    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

    <script>
        const grid = document.querySelector('.masonry-three-columns');
        const totalImages = 26; 

        for (let i = totalImages; i >= 1; i--) {
            const fileName = String(i).padStart(3, '0') + '.jpg';
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerHTML = `<img src="images/${fileName}" alt="Gallery Image ${fileName}">`;
            grid.appendChild(item);
        }

        const msnry = new Masonry(grid, {
            itemSelector: '.grid-item',
            columnWidth: '.grid-item',
            percentPosition: true,
            gutter: 50,
            transitionDuration: '0.1s'
        });

        imagesLoaded(grid).on('progress', function() {
            msnry.layout();
        });
    </script>
</body>
</html>
